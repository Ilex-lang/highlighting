name = "Neo"
grammar = "neo"
path_suffixes = ["neo"]
line_comments = ["// "]
block_comment = ["/-", "-/"]
autoclose_before = ";:.,=}])> \n\t"
word_characters = ["#", "$", "@"]

[overrides.string]
word_characters = []

[overrides.comment]
word_characters = []

[[brackets]]
start = "{"
end = "}"
close = true
newline = true

[[brackets]]
start = "["
end = "]"
close = true
newline = false

[[brackets]]
start = "("
end = ")"
close = true
newline = false

[[brackets]]
start = "\""
end = "\""
close = true
newline = false
not_in = ["string", "comment"]

[[brackets]]
start = "'"
end = "'"
close = true
newline = false
not_in = ["string", "comment"]

[[brackets]]
start = "`"
end = "`"
close = true
newline = false
not_in = ["string", "comment"]
